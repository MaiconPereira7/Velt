<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-card__header">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
          <path d="M6 8 L16 26 L26 8" stroke="#f7931a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Velt</span>
      </div>
      <p class="login-card__subtitle">Sua plataforma de gestão financeira</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input
          class="form-input"
          type="email"
          placeholder="seu@email.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Senha</label>
        <input
          class="form-input"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="login-hint">Não tem conta? <a routerLink="/register">Criar conta</a></p>
  </div>
</div>

<button class="sidebar-toggle" (click)="toggle()" [attr.aria-label]="mobileOpen() ? 'Fechar menu' : 'Abrir menu'">
  {{ mobileOpen() ? '✕' : '☰' }}
</button>

@if (mobileOpen()) {
  <div class="sidebar-backdrop" (click)="closeMobile()"></div>
}

<aside class="sidebar" [class.sidebar--open]="mobileOpen()">
  <div class="sidebar__logo">
    <span class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <path d="M6 8 L16 26 L26 8" stroke="#f7931a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="logo-text">Velt</span>
  </div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="nav-item--active"
        class="nav-item"
        (click)="closeMobile()"
      >
        <span class="nav-item__bar"></span>
        <span class="nav-item__icon" [innerHTML]="item.icon"></span>
        <span class="nav-item__label">{{ item.label }}</span>
        @if (item.badge) {
          <span class="nav-item__badge">{{ item.badge }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar__bottom">
    <div class="user-badge">
      <a routerLink="/perfil" class="user-badge__link" title="Ver perfil" (click)="closeMobile()">
        <div class="user-badge__avatar">{{ initials }}</div>
        <div class="user-badge__info">
          <div class="user-badge__name">{{ firstName }}</div>
          <div class="user-badge__role">Investidor</div>
        </div>
      </a>
      <button class="user-badge__logout" (click)="logout()" title="Sair">⏻</button>
    </div>
  </div>
</aside>
